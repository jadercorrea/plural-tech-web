<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Premium AI Directory. Explore 100+ curated High-End tools for maximum leverage.">
    <meta property="og:title" content="Plural Hub | Cofre VIP de I.A">
    <meta property="og:description" content="Premium AI Directory. Explore 100+ curated High-End tools for maximum leverage.">
    <meta property="og:image" content="https://pluraltech.com/assets/logo.png">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">
    <title>Plural Hub | Cofre VIP de I.A</title>
    <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,700,900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <script src="data.js"></script>

    <style>
        :root {
            --bg-base: #020202;
            --bg-panel: rgba(15, 15, 15, 0.4);
            --bg-card: rgba(22, 22, 22, 0.4);
            --border: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(254, 105, 2, 0.4);
            --brand: #FE6902;
            --text-pri: #FFFFFF;
            --text-sec: #A1A1AA;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Satoshi', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-pri);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Mesh Gradient Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(254, 105, 2, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(200, 50, 0, 0.03) 0%, transparent 30%);
            z-index: -1;
            animation: meshFloat 30s infinite linear;
        }

        @keyframes meshFloat {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Auth Gate Premium */
        #authOverlay {
            position: fixed; inset: 0; background: rgba(3, 3, 3, 0.98);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); z-index: 2000;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        #authOverlay.hidden { display: none; }
        .auth-box {
            position: relative;
            background: linear-gradient(180deg, rgba(20,20,20,0.8), rgba(10,10,10,0.9));
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 32px; padding: 50px 40px; max-width: 480px; width: 90%;
            box-shadow: 0 40px 100px -20px rgba(254,105,2,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .auth-box::before {
            content: ''; position: absolute; top: -1px; left: 10%; right: 10%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--brand), transparent); opacity: 0.5;
        }
        .lock-icon {
            width: 80px; height: 80px; margin: 0 auto 24px; border-radius: 50%;
            background: rgba(254,105,2,0.1); border: 1px solid rgba(254,105,2,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--brand);
            animation: pulseGlow 3s infinite alternate;
        }
        @keyframes pulseGlow { from { box-shadow: 0 0 20px rgba(254,105,2,0.1); } to { box-shadow: 0 0 50px rgba(254,105,2,0.4); } }
        .auth-box h2 { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 12px; }
        .auth-box .sub { color: var(--text-sec); font-size: 15px; margin-bottom: 24px; line-height: 1.6; }
        .info-box { background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.1); border-radius: 16px; padding: 16px; margin-bottom: 24px; font-size: 13px; color: var(--text-sec); line-height: 1.6; }
        .auth-box input {
            width: 100%; padding: 18px; margin-bottom: 16px; background: rgba(0,0,0,0.5);
            border: 1px solid var(--border); border-radius: 12px; color: var(--brand); text-align: center;
            letter-spacing: 3px; font-weight: 800; font-size: 14px; outline: none; transition: 0.3s;
        }
        .auth-box input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(254,105,2,0.1); }
        .auth-box button {
            width: 100%; padding: 18px; background: linear-gradient(135deg, #FE6902, #FE3C02); border: none;
            border-radius: 12px; color: white; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(254,105,2,0.2);
        }
        .auth-box button:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(254,105,2,0.3); }

        /* Layout */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 40px;
            display: none;
        }

        .app-container.ready {
            display: block;
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(to right, #FFF, #AAA);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header i {
            -webkit-text-fill-color: var(--brand); /* force icon color outside gradient */
        }

        .searchbox input {
            padding: 18px 24px;
            width: 380px;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .searchbox input:focus { 
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(254,105,2,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
            width: 420px;
        }

        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
        }
        @media(max-width: 900px) { .layout { grid-template-columns: 1fr; } .searchbox input:focus { width: 100%; } .searchbox input { width: 100%; } }

        .sidebar { 
            background: var(--bg-panel); 
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 32px; 
            height: fit-content; 
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .filter-title { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-sec); margin-bottom: 16px; font-weight: 700; }
        .filter-label { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; cursor: pointer; font-size: 14px; color: #E4E4E7; transition: 0.2s; font-weight: 500;}
        .filter-label:hover { color: #FFF; transform: translateX(2px); }
        .filter-label input { accent-color: var(--brand); width: 16px; height: 16px; cursor: pointer; }
        
        .counter { 
            background: linear-gradient(90deg, rgba(254,105,2,0.1), transparent); 
            border-left: 2px solid var(--brand);
            padding: 12px 20px; 
            margin-bottom: 30px; 
            font-size: 14px; 
            color: var(--text-sec); 
            border-radius: 0 8px 8px 0;
            display: inline-block;
        }
        .counter strong { color: #FFF; }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.05), transparent 60%);
            opacity: 0; transition: 0.4s; pointer-events: none;
        }

        .card:hover {
            border-color: var(--brand);
            transform: translateY(-3px);
            background: rgba(254,105,2,0.02);
        }

        .card-icon {
            color: var(--brand);
            font-size: 24px;
            margin-bottom: 12px;
        }

        .badges {
            display: flex;
            gap: 8px;
            margin-top: auto;
            padding-top: 16px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: bold;
            text-transform: capitalize;
        }
    </style>
</head>

<body>

    <div id="authOverlay">
        <div class="auth-box">
            <div class="lock-icon"><i class="fas fa-fingerprint"></i></div>
            <h2 id="authTitle">Acesso Restrito</h2>
            <p class="sub" id="authSub">O desbloqueio acontece automaticamente via <strong>Redirecionamento Inteligente</strong> após a compra.</p>
            <div class="info-box">
                <i class="fas fa-shield-alt" style="color:var(--brand); font-size:16px;"></i><br>
                <span id="authInfo">Se você limpou o cache e perdeu o acesso, insira sua <strong>Chave VIP</strong> (ID da Transação do Stripe) que consta no recibo por e-mail.</span>
            </div>
            <form id="vaultForm">
                <input type="text" id="authKey" placeholder="cs_live_XXXX..." required autocomplete="off">
                <button type="submit" id="btnSubmit">Validar Conexão</button>
            </form>
        </div>
    </div>

    <div class="app-container" id="app">
        <header class="header">
            <div>
                <h1 style="display:flex; align-items:center;">
                    <img src="../assets/logo.png" alt="Logo" style="width: 48px; height: 48px; border-radius: 12px; border: 1px solid rgba(254, 105, 2, 0.2); margin-right: 16px; object-fit: cover; box-shadow: 0 0 20px rgba(254, 105, 2, 0.2);">
                    Plural Hub
                </h1>
                <p style="color:var(--text-sec)" id="headerSub">Premium AI Directory.</p>
            </div>
            <div class="searchbox">
                <input type="text" id="searchInput" placeholder="Search tools...">
            </div>
        </header>

        <div class="counter" id="counter"></div>

        <div class="layout">
            <aside class="sidebar">
                <h3 class="filter-title" id="filterCatTitle">Categories</h3>
                <div id="filter-categories"></div>
                <h3 class="filter-title" style="margin-top:20px;" id="filterPriceTitle">Pricing</h3>
                <div id="filter-pricing"></div>
            </aside>
            <main class="results" id="grid"></main>
        </div>
    </div>

    <script>
        // --- i18n ---
        const currentLang = new URLSearchParams(window.location.search).get('lang') || 'en';
        const i18n = {
            en: { title: "Restricted Access", sub: "Unlocking happens automatically via <strong>Smart Redirect</strong> after purchase.", info: "If you cleared your cache and lost access, enter your <strong>VIP Key</strong> (Stripe Transaction ID) from your email receipt.", btn: "Validate Connection", headerSub: "Premium AI Directory.", search: "Search tools...", cats: "Categories", pricing: "Pricing", counter: (n) => `Showing <strong>${n}</strong> tools`, invalid: "Invalid Key. Check your email receipt." },
            pt: { title: "Acesso Restrito", sub: "O desbloqueio acontece automaticamente via <strong>Redirecionamento Inteligente</strong> após a compra.", info: "Se você limpou o cache e perdeu o acesso, insira sua <strong>Chave VIP</strong> (ID da Transação Stripe) do recibo por e-mail.", btn: "Validar Conexão", headerSub: "Diretório Premium de IA.", search: "Pesquisar ferramentas...", cats: "Categorias", pricing: "Precificação", counter: (n) => `Exibindo <strong>${n}</strong> ferramentas`, invalid: "Chave Inválida. Verifique seu recibo por e-mail." },
            es: { title: "Acceso Restringido", sub: "El desbloqueo ocurre automáticamente vía <strong>Redirección Inteligente</strong> después de la compra.", info: "Si limpiaste tu caché y perdiste acceso, ingresa tu <strong>Clave VIP</strong> (ID de Transacción Stripe) del recibo por email.", btn: "Validar Conexión", headerSub: "Directorio Premium de IA.", search: "Buscar herramientas...", cats: "Categorías", pricing: "Precios", counter: (n) => `Mostrando <strong>${n}</strong> herramientas`, invalid: "Clave Inválida. Verifica tu recibo por email." }
        };
        const i18nText = i18n[currentLang] || i18n.en;
        function getDesc(d) { return typeof d === 'object' ? (d[currentLang] || d.en) : d; }

        // Apply i18n to static elements
        document.getElementById('authTitle').textContent = i18nText.title;
        document.getElementById('authSub').innerHTML = i18nText.sub;
        document.getElementById('authInfo').innerHTML = i18nText.info;
        document.getElementById('btnSubmit').textContent = i18nText.btn;
        document.getElementById('headerSub').textContent = i18nText.headerSub;
        document.getElementById('searchInput').placeholder = i18nText.search;
        document.getElementById('filterCatTitle').textContent = i18nText.cats;
        document.getElementById('filterPriceTitle').textContent = i18nText.pricing;

        // --- AUTH ---
        function checkAuth() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            if (token && validateToken(token)) {
                localStorage.setItem('hub_access', 'ok');
                params.delete('token');
                const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
                try {
                    window.history.replaceState({}, '', newUrl);
                } catch(e) {
                    // Ignore on file:// protocol
                    console.log("replaceState not supported on file://");
                }
                revealApp(); return;
            }
            if (localStorage.getItem('hub_access') === 'ok') revealApp();
        }
        function validateToken(v) { const c = v.trim(); return c.toUpperCase() === 'PLURAL-VIP' || ((c.startsWith('cs_live_') || c.startsWith('cs_test_')) && c.length > 20); }
        document.getElementById('vaultForm').onsubmit = (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            setTimeout(() => {
                if (validateToken(document.getElementById('authKey').value)) {
                    localStorage.setItem('hub_access', 'ok');
                    btn.innerHTML = '<i class="fas fa-check"></i>';
                    btn.style.background = '#22c55e';
                    setTimeout(revealApp, 600);
                } else {
                    btn.textContent = i18nText.invalid;
                    btn.style.background = '#ef4444';
                    setTimeout(() => { btn.textContent = i18nText.btn; btn.style.background = ''; }, 2000);
                }
            }, 800);
        };
        function revealApp() {
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('app').classList.add('ready');
            initEngine();
        }
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', checkAuth);
        } else {
            checkAuth();
        }

        // --- FUSE ENGINE ---
        let fuse;
        let activeCats = [];
        let activePricing = [];

        function initEngine() {
            // Build searchable text for Fuse
            const searchableTools = aiTools.map(tool => ({...tool, searchDesc: getDesc(tool.desc)}));
            fuse = new Fuse(searchableTools, { 
                keys: [
                    { name: 'title', weight: 2 },
                    { name: 'searchDesc', weight: 1 },
                    { name: 'category', weight: 1 }
                ], 
                threshold: 0.45, 
                ignoreLocation: true,
                distance: 500
            });
            document.getElementById('searchInput').addEventListener('input', applySearch);
            renderFilters();
            renderGrid(aiTools);
        }

        function renderFilters() {
            const cats = [...new Set(aiTools.map(t => t.category))].sort();
            const prices = [...new Set(aiTools.map(t => t.pricing))].sort();
            document.getElementById('filter-categories').innerHTML = cats.map(c =>
                `<label class="filter-label"><input type="checkbox" onchange="toggleFilter('cat','${c}')"> ${c}</label>`
            ).join('');
            document.getElementById('filter-pricing').innerHTML = prices.map(p =>
                `<label class="filter-label"><input type="checkbox" onchange="toggleFilter('price','${p}')"> ${p}</label>`
            ).join('');
        }

        function toggleFilter(type, val) {
            const arr = type === 'cat' ? activeCats : activePricing;
            const idx = arr.indexOf(val);
            if (idx > -1) arr.splice(idx, 1); else arr.push(val);
            applySearch();
        }

        function applySearch() {
            const q = document.getElementById('searchInput').value;
            let results = q ? fuse.search(q).map(r => r.item) : aiTools;
            if (activeCats.length > 0) results = results.filter(t => activeCats.includes(t.category));
            if (activePricing.length > 0) results = results.filter(t => activePricing.includes(t.pricing));
            renderGrid(results);
        }

        function renderGrid(data) {
            document.getElementById('counter').innerHTML = i18nText.counter(data.length);
            const grid = document.getElementById('grid');
            if (data.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-sec);padding:60px;border:1px dashed var(--border);border-radius:20px;"><i class="fas fa-ghost" style="font-size:32px;opacity:0.4;margin-bottom:12px;display:block;"></i>No tools found.</div>';
                return;
            }
            grid.innerHTML = data.map(tool => `
                <a href="${tool.url}" target="_blank" class="card">
                    <i class="fas ${tool.icon} card-icon"></i>
                    <h3 style="font-size:18px;font-weight:800;">${tool.title}</h3>
                    <p style="color:var(--text-sec); font-size:13px; margin-top:8px; line-height:1.5;">${getDesc(tool.desc)}</p>
                    <div class="badges">
                        <span class="badge" style="color:var(--brand)">${tool.category}</span>
                        <span class="badge">${tool.pricing}</span>
                    </div>
                </a>
            `).join('');
        }
    </script>
</body>

</html>
